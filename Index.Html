<!DOCTYPE html>
<html>
<head>
  <title>The Saidhya Palace</title>
  <style>
    body {
      font-family: 'Georgia', serif;
      margin:0;
      background:#f8f8f8;
    }

    header {
      background:black;
      color:gold;
      padding:20px;
      text-align:center;
    }

    header h1 {
      margin:0;
      font-size:32px;
      letter-spacing:2px;
    }

    nav {
      background:#111;
      padding:12px;
      text-align:center;
    }

    nav a {
      color:gold;
      margin:15px;
      text-decoration:none;
      font-weight:bold;
    }

    nav a:hover {
      color:white;
    }

    .section {
      padding:30px;
      text-align:center;
    }

    .room {
      border:1px solid #ddd;
      background:white;
      padding:20px;
      margin:15px;
      border-radius:10px;
      box-shadow:0 0 10px rgba(0,0,0,0.1);
    }

    button {
      background:gold;
      border:none;
      padding:10px 20px;
      font-weight:bold;
      cursor:pointer;
    }

    button:hover {
      background:black;
      color:gold;
    }

    footer {
      background:black;
      color:white;
      text-align:center;
      padding:15px;
    }
  </style>
</head>

<body>

<header>
  <h1>The Saidhya Palace</h1>
  <p>✨ Experience Royal Comfort ✨</p>
</header>

<nav>
  <a href="#">Home</a>
  <a href="#">Rooms</a>
  <a href="#">Gallery</a>
  <a href="#">Contact</a>
</nav>

<div class="section">
  <h2>Our Luxury Rooms</h2>

  <div class="room">
    <h3>Deluxe Room</h3>
    <p>Price: ₹2500/night</p>
  </div>

  <div class="room">
    <h3>Royal Suite</h3>
    <p>Price: ₹5000/night</p>
  </div>

</div>

<div class="section">
  <h2>Book Your Stay</h2>
  <form>
    <input type="text" placeholder="Your Name"><br><br>
    <input type="date"><br><br>
    <input type="date"><br><br>
    <button>Book Now</button>
  </form>
</div>

<footer>
  <p>📞 Contact: 9876543210</p>
</footer>

</body>
</html>
